<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Surprise! 🎂</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <p style="font-size: 24px; line-height: 1.6; margin-top: 15px; font-weight: bold;">
        Hwllo! <br>
        i know shit about coding T^T
      </p>
    </div>

    <div id="letter-container">
      <div class="letter-window">
        <p id="letter-title" style="font-size: 20px; line-height: 1.5; font-weight: bold; margin: 0; min-height: 220px; text-align: center; white-space: pre-line;"></p>

        <video id="letter-video" loop playsinline style="width: 200px; max-height: 200px; margin: 15px auto; display: block; border-radius: 10px;">
          <source src="guitargurl.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>

        <div id="letter-buttons" style="display: none; justify-content: center; margin-top: 15px;">
          <img src="envelope.png" alt="Next Envelope" id="next-envelope-btn" style="width: 80px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'" />
        </div>

        <p id="final-text" class="final-text" style="display: none">
          Grateful to have you,<br>as whatever you are within my conciousness.<br>I'm not a simp i swear but love you lot🌙.<br><br>সেমিস্টার এ ফেল  আমি 🥀
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
